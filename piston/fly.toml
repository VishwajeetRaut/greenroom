app = 'greenroom-piston'
primary_region = 'arn'

[build]
  image = 'ghcr.io/engineer-man/piston:latest'

[http_service]
  internal_port = 2000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'piston_data'
  destination = '/piston'
