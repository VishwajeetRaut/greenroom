<svg xmlns="http://www.w3.org/2000/svg" width="680" height="390" viewBox="0 0 680 390">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Frontend -->
  <rect x="60" y="20" width="560" height="65" rx="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="340" y="44" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">Frontend</text>
  <text x="340" y="64" text-anchor="middle" font-size="12" fill="#2563a8">React + Vite · Web Speech API · Monaco editor · Excalidraw</text>

  <!-- Arrow: Frontend to API -->
  <line x1="200" y1="85" x2="200" y2="143" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Backend API -->
  <rect x="60" y="145" width="280" height="95" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="0.8"/>
  <text x="200" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#064e3b">Backend API</text>
  <text x="200" y="192" text-anchor="middle" font-size="12" fill="#065f46">FastAPI · LangChain LCEL</text>
  <text x="200" y="212" text-anchor="middle" font-size="12" fill="#065f46">Groq Llama 3.3 70B · Ollama fallback</text>

  <!-- Arrow: API to Code Runner -->
  <line x1="340" y1="192" x2="378" y2="192" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Code Runner -->
  <rect x="380" y="145" width="240" height="95" rx="10" fill="#fee2d5" stroke="#fca58b" stroke-width="0.8"/>
  <text x="500" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#4c1309">Code runner</text>
  <text x="500" y="192" text-anchor="middle" font-size="12" fill="#7c2d12">Self-hosted Piston (internal)</text>
  <text x="500" y="212" text-anchor="middle" font-size="12" fill="#7c2d12">Wandbox fallback</text>

  <!-- Arrow: API to Supabase -->
  <line x1="190" y1="240" x2="190" y2="298" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Arrow: API to LLM -->
  <path d="M210,240 L210,268 L500,268 L500,298" fill="none" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Supabase -->
  <rect x="60" y="300" width="260" height="68" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="0.8"/>
  <text x="190" y="323" text-anchor="middle" font-size="14" font-weight="600" fill="#2e1065">Supabase</text>
  <text x="190" y="343" text-anchor="middle" font-size="12" fill="#4c1d95">PostgreSQL · Auth · RLS</text>

  <!-- LLM External -->
  <rect x="380" y="300" width="240" height="68" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="0.8"/>
  <text x="500" y="323" text-anchor="middle" font-size="14" font-weight="600" fill="#451a03">LLM (external)</text>
  <text x="500" y="343" text-anchor="middle" font-size="12" fill="#78350f">Groq · Ollama Cloud</text>
</svg>
