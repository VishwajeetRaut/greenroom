# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - Greenroom

on:
  push:
    branches:
      - "Yuang-Chen's-database-security-update"
    paths:
      - "backend/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate backend dependencies
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall -q .

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          include-hidden-files: false
          path: |
            backend/
            !backend/antenv/
            !backend/.venv/
            !backend/.env
            !backend/**/__pycache__/
            !backend/**/*.pyc

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: backend-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F54B57359A074C7D80E3F627B768DFE3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_680ECE6C75474862A0BB6593F6BD9336 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_89C4DF359D654B6F88D72D8C1069D57A }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "Greenroom"
          slot-name: "Production"
          package: backend-package
