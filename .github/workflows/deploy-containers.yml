name: Build Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "piston/**"
      - ".github/workflows/deploy-containers.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/greenroom-api
  PISTON_IMAGE: ghcr.io/${{ github.repository_owner }}/greenroom-piston

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Piston image
        id: meta-piston
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PISTON_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Piston image
        uses: docker/build-push-action@v5
        with:
          context: piston
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-piston.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
